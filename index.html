<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中科廠 稼動率統計系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar">
        <h3 class="logo">🏭 科雅 OEE Tracker</h3>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('tab-daily')">📝 每日報工</li>
            <li class="nav-item" onclick="switchTab('tab-stats')">📊 統計與導出</li>
            <li class="nav-item" onclick="switchTab('tab-settings')">⚙️ 基礎設定</li>
        </ul>
    </div>

    <div class="main-content">
        
        <section id="tab-daily" class="tab-pane active">
            <h2>每日報工</h2>
            
            <div class="card">
                <h3>1. 生產基本資料</h3>
                <div class="form-grid">
                    <div>
                        <label>日期</label>
                        <input type="date" id="workDate">
                    </div>
                    <div>
                        <label>線別</label>
                        <select id="lineSelect" onchange="updateMachineList()"></select>
                    </div>
                    <div>
                        <label>開線時間 (24H)</label>
                        <input type="number" id="startTime" placeholder="例: 08" min="0" max="23">
                    </div>
                    <div>
                        <label>結束時間 (24H)</label>
                        <input type="number" id="endTime" placeholder="例: 17" min="0" max="23">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="hasBreak">
                        <label for="hasBreak">是否輪休 (扣除休息 60 分鐘)</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>2. 新增機台與停機紀錄</h3>
                <div class="form-grid">
                    <div>
                        <label>機台名稱</label>
                        <select id="machineSelect"><option value="">請先選擇線別</option></select>
                    </div>
                    <div>
                        <label>登記人</label>
                        <input type="text" id="operatorName" placeholder="輸入工號或姓名">
                    </div>
                    <div>
                        <label>停機項目</label>
                        <select id="downtimeReason"></select>
                    </div>
                    <div>
                        <label>停機時間 (分鐘)</label>
                        <input type="number" id="downtimeMins" placeholder="輸入分鐘數">
                    </div>
                    <div>
                        <label>&nbsp;</label>
                        <button class="btn-primary" onclick="addDowntimeRecord()">➕ 加入停機</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>3. 今日暫存停機紀錄 (待儲存)</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>機台</th>
                            <th>停機分類</th>
                            <th>原因</th>
                            <th>時間(分)</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="downtimeTableBody">
                        </tbody>
                </table>
                <div class="summary-bar">
                    <span id="totalDowntimeLabel">此機台總停機：0 分鐘</span>
                    <button class="btn-success" onclick="saveMachineDataToDB()">💾 儲存此機台紀錄</button>
                </div>
            </div>
        </section>

        <section id="tab-stats" class="tab-pane">
            <h2>統計與導出</h2>
            <div class="card">
                <p>查詢與 OEE 計算功能建置中...</p>
                </div>
        </section>

        <section id="tab-settings" class="tab-pane">
            <h2>基礎設定 (線別、機台與停機原因管理)</h2>
            <div class="card">
                <p>此區塊可串接 LocalStorage，讓設備工程師自行新增機台清單...</p>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
