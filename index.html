<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科雅光電 - 設備稼動率回報系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            color: #0056b3;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #495057;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #0056b3;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        .hint {
            font-size: 13px;
            color: #6c757d;
            margin-top: -15px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 設備稼動率回報系統</h2>
        <p style="margin-top: 5px; color: #666; font-size: 14px;">每日下班前請確實填寫</p>
    </div>

    <label for="input_line">1. 線別 (Line) *</label>
    <select id="input_line" onchange="updateMachineList()">
        <option value="" disabled selected>請選擇線別...</option>
        <option value="SMT線">SMT線</option>
        <option value="雷切線">雷切線</option>
        <option value="DAF線">DAF線</option>
        <option value="結構組裝線">結構組裝線</option>
    </select>

    <label for="input_machine">2. 設備名稱 *</label>
    <select id="input_machine">
        <option value="" disabled selected>請先選擇上方線別...</option>
    </select>

    <label for="input_time">3. 總工時 (分鐘) *</label>
    <span class="hint">範例：常日班請填 540，依加班時間遞增</span>
    <input type="number" id="input_time" placeholder="請輸入總工時">

    <button onclick="sendData()" id="submitBtn">📤 送出資料</button>
</div>

<script>
    // --- 【防呆設計】動態機台選單連動邏輯 ---
    const machineData = {
        "SMT線": ["SPG 印刷機", "SPI 錫膏檢查機", "NPM 貼片機", "BTU 迴焊爐", "AOI 檢測機", "UF 點膠機", "FU 點膠機"],
        "雷切線": ["雷切機(1)", "雷切機(2)"],
        "DAF線": ["DAF機(1)", "DAF機(2)", "PLASMA 清洗機", "1000x1300 脫泡機", "RD 點膠機"],
        "結構組裝線": ["自動鎖螺絲機", "功能測試機"]
    };

    function updateMachineList() {
        const lineSelect = document.getElementById("input_line");
        const machineSelect = document.getElementById("input_machine");
        const selectedLine = lineSelect.value;
        
        // 清空現有機台選單
        machineSelect.innerHTML = '<option value="" disabled selected>請選擇設備名稱...</option>';
        
        // 帶入對應的機台
        if (machineData[selectedLine]) {
            machineData[selectedLine].forEach(function(machine) {
                let option = document.createElement("option");
                option.value = machine;
                option.text = machine;
                machineSelect.appendChild(option);
            });
        }
    }

    // --- Supabase 資料庫連線設定 ---
    const SUPABASE_URL = 'https://mmqsgkqpfpriwxztlxxc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable.你的超長亂碼貼這裡'; // ⚠️ 千豪，記得換成你抄下來的鑰匙！
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 送出資料邏輯 ---
    async function sendData() {
        // 防止重複點擊
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerText = "⏳ 傳送中...";

        let lineVal = document.getElementById('input_line').value;
        let machineVal = document.getElementById('input_machine').value;
        let timeVal = document.getElementById('input_time').value;

        // 簡單的空白防呆檢查
        if(!lineVal || !machineVal || !timeVal) {
            alert("⚠️ 請將線別、機台與總工時填寫完整！");
            document.getElementById("submitBtn").disabled = false;
            document.getElementById("submitBtn").innerText = "📤 送出資料";
            return;
        }

        // 寫入 Supabase 資料庫
        const { data, error } = await supabase
            .from('machine_logs')
            .insert([
                { 
                    line_name: lineVal, 
                    machine_name: machineVal, 
                    total_time: timeVal 
                }
            ]);

        if (error) {
            alert("❌ 糟糕，出錯了：" + error.message);
        } else {
            alert("✅ 太棒了！設備稼動數據已成功送到資料庫！");
            // 成功後清空表單
            document.getElementById('input_time').value = '';
        }
        
        // 恢復按鈕
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").innerText = "📤 送出資料";
    }
</script>

</body>
</html>
